name: AgentRelay
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    macOS: "15.0"
  groupSortPosition: top
  createIntermediateGroups: true
packages:
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: 9.0.0
  LaunchAtLoginModern:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: 1.1.0
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  AgentRelayUI:
    type: framework
    platform: macOS
    sources:
      - path: RelayApp
        excludes:
          - Resources/Assets.xcassets
          - Resources/README.md
    resources:
      - path: RelayApp/Resources
        excludes:
          - Assets.xcassets
          - README.md
    dependencies:
      - package: Defaults
      - package: LaunchAtLoginModern
        product: LaunchAtLogin
    settings:
      base:
        PRODUCT_MODULE_NAME: AgentRelayUI
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentrelay.macos.ui
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: NO
  AgentRelay:
    type: application
    platform: macOS
    sources:
      - path: RelayAppExecutable
    resources:
      - path: RelayApp/Resources
        includes:
          - Assets.xcassets
    postBuildScripts:
      - path: scripts/package-agrelay.sh
        name: Package agrelay CLI
        shell: /bin/bash
        inputFiles:
          - $(SRCROOT)/../../Cargo.toml
          - $(SRCROOT)/../../Cargo.lock
          - $(SRCROOT)/../../apps/relay-cli/Cargo.toml
          - $(SRCROOT)/Package.resolved
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/agrelay
        basedOnDependencyAnalysis: false
        showEnvVars: false
    dependencies:
      - target: AgentRelayUI
    settings:
      base:
        PRODUCT_MODULE_NAME: AgentRelay
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentrelay.macos
        PRODUCT_NAME: AgentRelay
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: RelayAppExecutable/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: NO
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: YES
    scheme:
      testTargets:
        - RelayMacOSTests
  RelayMacOSTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/RelayMacOSTests
    dependencies:
      - target: AgentRelayUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentrelay.macos.tests
        GENERATE_INFOPLIST_FILE: YES
