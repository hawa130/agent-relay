name: AgentRelay
options:
  minimumXcodeGenVersion: 2.45.0
  deploymentTarget:
    macOS: "15.0"
  groupSortPosition: top
  createIntermediateGroups: true
packages:
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: 9.0.0
  LaunchAtLoginModern:
    url: https://github.com/sindresorhus/LaunchAtLogin-Modern
    from: 1.1.0
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
targets:
  RelayMacOSUI:
    type: framework
    platform: macOS
    sources:
      - path: RelayApp
        excludes:
          - Resources/README.md
          - Resources/Info.plist
    resources:
      - path: RelayApp/Resources
        excludes:
          - Info.plist
          - README.md
    dependencies:
      - package: Defaults
      - package: LaunchAtLoginModern
        product: LaunchAtLogin
    settings:
      base:
        PRODUCT_MODULE_NAME: RelayMacOSUI
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentrelay.macos.ui
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: NO
  AgentRelay:
    type: application
    platform: macOS
    sources:
      - path: RelayAppExecutable
    dependencies:
      - target: RelayMacOSUI
    settings:
      base:
        PRODUCT_MODULE_NAME: AgentRelay
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentrelay.macos
        PRODUCT_NAME: AgentRelay
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: RelayApp/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        SWIFT_EMIT_LOC_STRINGS: NO
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
    scheme:
      testTargets:
        - RelayMacOSTests
  RelayMacOSTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/RelayMacOSTests
    dependencies:
      - target: RelayMacOSUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.agentrelay.macos.tests
        GENERATE_INFOPLIST_FILE: YES
