nchmod +x \"$DESTINATION_PATH\"\n\nSIGN_IDENTITY=\"-\"\nif [[ \"${CODE_SIGNING_ALLOWED:-NO}\" == \"YES\" && -n \"${EXPANDED_CODE_SIGN_IDENTITY:-}\" ]]; then\n  SIGN_IDENTITY=\"$EXPANDED_CODE_SIGN_IDENTITY\"\nfi\n\ncodesign --force --sign \"$SIGN_IDENTITY\" --timestamp=none \"$DESTINATION_PATH\"\n";
